<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>同時移動與縮放示範（含第3次置中與隨機B，避免蓋到A）</title>
  <style>
    :root{
      --step: 100px;      /* 每次移動距離 */
      --max-offset: 300; /* 最大位移 (px) */
      --shrink-factor: 0.6; /* 每次點 B B 縮小比例 */
      --grow-factor: 1.8;   /* 每次點 B A 放大比例 */
      --min-b: 0.1;     /* B 最小 scale */
      --max-a: 40;      /* A 最大 scale */
      --anim: 160ms;
    }

    body{
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans CJK TC", "Microsoft JhengHei";
      background:#f6f8fb; padding:24px;
      display:flex; align-items:center; justify-content:center; min-height:100vh;
    }
    .card{ width:640px; max-width:94vw; background:#fff; padding:20px; border-radius:12px; box-shadow:0 8px 28px rgba(20,30,50,0.06); text-align:center; }
    h1{ margin:0 0 12px; font-size:18px; }
    .img-wrap{ margin-bottom:12px; }
    .img-wrap img{ width:80%; max-width:560px; border-radius:8px; }
    .controls{ display:flex; gap:12px; justify-content:center; align-items:center; margin:10px 0 6px; height:56px; }
    .option-btn{
      min-width:140px; flex:0 0 45%; padding:10px 14px; border-radius:10px; border:1px solid #d0d6e0;
      background:#f5f7fb; cursor:pointer; font-size:15px;
      transition: transform var(--anim) ease, box-shadow var(--anim) ease, background var(--anim), left var(--anim) ease, top var(--anim) ease;
      user-select:none; position:relative;
      transform: translateX(0) scale(1);
    }
    .option-btn.selected{ background: linear-gradient(180deg,#4f9ef5,#3b7ee8); color:#fff; border-color:#2f6fd6; box-shadow:0 8px 22px rgba(63,115,210,0.14); }
    .note{ color:#666; font-size:13px; margin-top:8px; min-height:22px; }
    @media (max-width:480px){ .controls{ flex-direction:column; height:auto; gap:10px } .option-btn{ width:100%; flex-basis:auto; min-width:0 } }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="prompt">你要選哪一個選項？</h1>

    <div class="img-wrap">
      <img src="1.png" alt="示範圖片" loading="lazy">
    </div>

    <div class="controls" id="controls" role="radiogroup" aria-labelledby="prompt">
      <button id="optA" class="option-btn" role="radio" aria-checked="false">選項 A</button>
      <button id="optB" class="option-btn" role="radio" aria-checked="false">選項 B</button>
    </div>

  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const optA = document.getElementById('optA');
      const optB = document.getElementById('optB');
      const note = document.getElementById('note');

      const step = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--step')) || 14;
      const maxOffset = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--max-offset')) || 160;
      const shrinkFactor = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--shrink-factor')) || 0.95;
      const growFactor = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--grow-factor')) || 1.03;
      const minB = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--min-b')) || 0.45;
      const maxA = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--max-a')) || 1.8;

      let offsetA = 0, offsetB = 0;
      let scaleA = 1, scaleB = 1;
      let clickCountB = 0;

      let aCentered = false;
      let bIsRandom = false;
      let bRandomX = null, bRandomY = null;

      function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

          // --- 簡易 toast（showToast）函式 ---
    function showToast(message, options = {}) {
      const { duration = 1500, type = 'info' } = options;
      const colors = {
        info:   { bg: '#eef2ff', border: '#7c9cff', txt: '#1e3a8a' },
        success:{ bg: '#ecfdf5', border: '#34d399', txt: '#065f46' },
        warning:{ bg: '#fffbeb', border: '#f59e0b', txt: '#78350f' },
        error:  { bg: '#fff1f2', border: '#fb7185', txt: '#7f1d1d' }
      };
      const col = colors[type] || colors.info;

      // 建立 container（右上）如果不存在
      const id = 'toast-container-top-right';
      let container = document.getElementById(id);
      if (!container) {
        container = document.createElement('div');
        container.id = id;
        Object.assign(container.style, {
          position: 'fixed',
          top: '12px',
          right: '12px',
          zIndex: 9999,
          display: 'flex',
          flexDirection: 'column',
          gap: '8px',
          pointerEvents: 'none'
        });
        document.body.appendChild(container);
      }

      const toast = document.createElement('div');
      toast.className = 'toast';
      Object.assign(toast.style, {
        background: col.bg,
        color: col.txt,
        borderLeft: `4px solid ${col.border}`,
        pointerEvents: 'auto',
        opacity: '0',
        transform: 'translateY(-6px)'
      });
      toast.textContent = message;

      container.appendChild(toast);
      // show
      requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';
      });

      let hideTimeout = null;
      if (duration > 0) {
        hideTimeout = setTimeout(() => remove(), duration);
      }

      function remove() {
        if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-6px)';
        setTimeout(() => {
          if (toast.parentElement) toast.parentElement.removeChild(toast);
          if (container && container.children.length === 0 && container.parentElement) container.parentElement.removeChild(container);
        }, 220);
      }

      // 暫停/繼續（滑鼠）
      toast.addEventListener('mouseenter', () => { if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }});
      toast.addEventListener('mouseleave', () => { if (duration > 0 && !hideTimeout) hideTimeout = setTimeout(remove, duration); });

      // 點擊直接關閉
      toast.addEventListener('click', remove);

      return { close: remove };
    }
    // --- end showToast ---

      function rectsOverlap(r1, r2, padding = 0) {
        return !(r1.right + padding <= r2.left - padding ||
                 r1.left - padding >= r2.right + padding ||
                 r1.bottom + padding <= r2.top - padding ||
                 r1.top - padding >= r2.bottom + padding);
      }

      function computeRandomPosAvoidingA(el, avoidEl, padding = 12, attempts = 120) {
        const rectEl = el.getBoundingClientRect();
        const elW = rectEl.width;
        const elH = rectEl.height;
        const avoidRect = avoidEl.getBoundingClientRect();
        const margin = padding;
        const maxX = Math.max(0, window.innerWidth - elW - margin);
        const maxY = Math.max(0, window.innerHeight - elH - margin);
        let bestCandidate = null;
        let bestDistance = -Infinity;
        for (let i = 0; i < attempts; i++) {
          const x = Math.floor(Math.random() * (maxX + 1)) + Math.floor(margin / 2);
          const y = Math.floor(Math.random() * (maxY + 1)) + Math.floor(margin / 2);
          const candRect = { left:x, top:y, right:x+elW, bottom:y+elH, width:elW, height:elH };
          if (!rectsOverlap(candRect, avoidRect, padding)) return { x, y };
          const cx = x + elW / 2, cy = y + elH / 2;
          const acx = (avoidRect.left + avoidRect.right) / 2;
          const acy = (avoidRect.top + avoidRect.bottom) / 2;
          const dist = Math.hypot(cx - acx, cy - acy);
          if (dist > bestDistance) { bestDistance = dist; bestCandidate = { x, y }; }
        }
        const rightX = Math.min(window.innerWidth - rectEl.width - Math.floor(margin / 2), avoidRect.right + padding);
        const leftX = Math.max(Math.floor(margin / 2), avoidRect.left - padding - rectEl.width);
        if (rightX >= Math.floor(margin / 2) && rightX <= window.innerWidth - rectEl.width - Math.floor(margin / 2)) {
          const candidate = { x: rightX, y: clamp(avoidRect.top, Math.floor(margin / 2), window.innerHeight - rectEl.height - Math.floor(margin / 2)) };
          const candRect = { left:candidate.x, top:candidate.y, right:candidate.x+rectEl.width, bottom:candidate.y+rectEl.height };
          if (!rectsOverlap(candRect, avoidRect, padding)) return candidate;
        }
        if (leftX >= Math.floor(margin / 2)) {
          const candidate = { x: leftX, y: clamp(avoidRect.top, Math.floor(margin / 2), window.innerHeight - rectEl.height - Math.floor(margin / 2)) };
          const candRect = { left:candidate.x, top:candidate.y, right:candidate.x+rectEl.width, bottom:candidate.y+rectEl.height };
          if (!rectsOverlap(candRect, avoidRect, padding)) return candidate;
        }
        if (bestCandidate) return bestCandidate;
        return { x: Math.max(Math.floor(margin / 2), window.innerWidth - rectEl.width - Math.floor(margin / 2)), y: Math.max(Math.floor(margin / 2), window.innerHeight - rectEl.height - Math.floor(margin / 2)) };
      }

      function applyTransforms() {
        if (!aCentered) {
          optA.style.position = 'relative';
          optA.style.left = '';
          optA.style.top = '';
          optA.style.zIndex = '';
          optA.style.transform = `translateX(${offsetA}px) scale(${scaleA})`;
        } else {
          optA.style.position = 'fixed';
          optA.style.left = '50%';
          optA.style.top = '50%';
          optA.style.zIndex = 999;
          optA.style.transform = `translate(-50%,-50%) scale(${scaleA})`;
        }

        if (!bIsRandom) {
          optB.style.position = 'relative';
          optB.style.left = '';
          optB.style.top = '';
          optB.style.zIndex = '';
          optB.style.transform = `translateX(${offsetB}px) scale(${scaleB})`;
        } else {
          optB.style.position = 'fixed';
          if (bRandomX === null || bRandomY === null) {
            const pos = computeRandomPosAvoidingA(optB, optA, 12, 120);
            bRandomX = pos.x; bRandomY = pos.y;
          }
          optB.style.left = `${bRandomX}px`;
          optB.style.top = `${bRandomY}px`;
          optB.style.zIndex = 998;
          optB.style.transform = `translate(0,0) scale(${scaleB})`;
        }
      }

      function onClickB(){
        clickCountB++;
        if (!bIsRandom) {
          const nextA = clamp(offsetA - step, -maxOffset, 0);
          const nextB = clamp(offsetB + step, 0, maxOffset);
          const nextScaleB = Math.max(minB, scaleB * shrinkFactor);
          const nextScaleA = Math.min(maxA, scaleA * growFactor);
          offsetA = nextA; offsetB = nextB; scaleA = nextScaleA; scaleB = nextScaleB;
        } else {
          const pos = computeRandomPosAvoidingA(optB, optA, 12, 120);
          bRandomX = pos.x; bRandomY = pos.y;
          scaleB = Math.max(minB, scaleB * shrinkFactor);
          scaleA = Math.min(maxA, scaleA * growFactor);
        }

        if (clickCountB === 3 && !aCentered) { aCentered = true; offsetA = 0; bRandomX = null; bRandomY = null; }
        if (clickCountB >= 4) {
          bIsRandom = true;
          if (bRandomX === null || bRandomY === null) {
            const pos = computeRandomPosAvoidingA(optB, optA, 12, 120);
            bRandomX = pos.x; bRandomY = pos.y;
          }
        }

        optB.classList.add('selected'); optB.setAttribute('aria-checked','true');
        optA.classList.remove('selected'); optA.setAttribute('aria-checked','false');

        applyTransforms();

        if (!bIsRandom) {
          note.textContent = `已點 B ${clickCountB} 次 — A: offset ${offsetA}px, scale ${scaleA.toFixed(2)}；B: offset ${offsetB}px, scale ${scaleB.toFixed(2)}。第 ${clickCountB === 3 ? '3 次：A 已置中。' : ''}第 4 次起 B 會隨機移動。點 A 可前往新頁面。`;
        } else {
          note.textContent = `已點 B ${clickCountB} 次（隨機模式）— B 移至隨機位置 (${Math.round(bRandomX)}, ${Math.round(bRandomY)})，B scale ${scaleB.toFixed(2)}；A scale ${scaleA.toFixed(2)}。點 A 可回到說明頁。`;
        }
      }

      // 點 A 導到新頁 a_page.html（同資料夾）
      function onClickA(){
        if (clickCountB >= 4) {
          // 直接導頁：若想保留重置可在新頁返回時處理
          window.location.href = 'a_page.html';
        }
        else {
          showToast('尚未達到 5 次，無法前往說明頁', { type: 'info', duration: 1400 });
        }
      }

      // 綁事件與鍵盤支援
      optB.addEventListener('click', onClickB);
      optA.addEventListener('click', onClickA);
      [optA,optB].forEach((btn, idx, arr) => {
        btn.tabIndex = 0;
        btn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
          else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); arr[(idx+1)%arr.length].focus(); }
          else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); arr[(idx-1+arr.length)%arr.length].focus(); }
        });
      });

      window.addEventListener('resize', () => {
        if (bIsRandom) {
          const pos = computeRandomPosAvoidingA(optB, optA, 12, 120);
          bRandomX = pos.x; bRandomY = pos.y;
          applyTransforms();
        }
      });

      applyTransforms();
    });
  </script>
</body>
</html>
