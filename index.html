<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>選項範例（含圖片）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      padding: 24px;
      background: #f7f8fb;
      color: #222;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(20,30,50,0.08);
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
    }

    /* 圖片區塊 */
    .img-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }
    .img-wrapper img {
      width: 100%;
      max-width: 520px;     /* 圖片最大寬度，可調 */
      height: auto;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 6px 18px rgba(20,30,50,0.06);
      cursor: pointer;      /* 如果想做點擊放大效果可用 */
    }
    .caption {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-top: 6px;
    }

    .options {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .option-btn {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d0d6e0;
      border-radius: 8px;
      background: #f5f7fb;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.12s ease;
      text-align: center;
      user-select: none;
    }
    .option-btn:hover { transform: translateY(-2px); }
    .option-btn.selected {
      background: linear-gradient(180deg,#4f9ef5,#3b7ee8);
      color: white;
      border-color: #2f6fd6;
      box-shadow: 0 6px 18px rgba(63,115,210,0.18);
    }
    .result {
      font-size: 15px;
      color: #333;
      min-height: 24px;
    }

    /* 小屏幕調整 */
    @media (max-width:420px) {
      .container { padding: 14px; }
      .img-wrapper img { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 頂部提示 -->
    <h1 id="prompt">你要選哪一個選項？</h1>

    <!-- 圖片放在提示下方 -->
    <figure class="img-wrapper">
      <!-- 把下面 src 換成你的圖片路徑或 URL -->
      <img src="1.png" alt="示範圖片說明：可以在此放一張說明圖" loading="lazy" id="mainImage">
      <!--<figcaption class="caption">（圖片說明文字，可選）</figcaption>-->
    </figure>

    <!-- 兩個選項按鈕 -->
    <div class="options" role="radiogroup" aria-labelledby="prompt">
      <button class="option-btn" id="optA" role="radio" aria-checked="false">選項 A</button>
      <button class="option-btn" id="optB" role="radio" aria-checked="false">選項 B</button>
    </div>

    <!-- 顯示選擇結果 -->
    <div class="result" id="result"></div>
  </div>

  <script>
    // 取得元素
    const optA = document.getElementById('optA');
    const optB = document.getElementById('optB');
    const result = document.getElementById('result');
    const mainImage = document.getElementById('mainImage');

    const options = [optA, optB];

    function handleSelect(clicked) {
      options.forEach(btn => {
        const isClicked = btn === clicked;
        btn.classList.toggle('selected', isClicked);
        btn.setAttribute('aria-checked', String(isClicked));
      });
      result.textContent = `你選了：${clicked.textContent}`;
    }

    optA.addEventListener('click', () => handleSelect(optA));
    optB.addEventListener('click', () => handleSelect(optB));

    options.forEach((btn, idx) => {
      btn.tabIndex = 0;
      btn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleSelect(btn);
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          options[(idx + 1) % options.length].focus();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          options[(idx - 1 + options.length) % options.length].focus();
        }
      });
    });

    // 可選：點擊圖片時顯示提示（或做其他互動）
    mainImage.addEventListener('click', () => {
      alert('你點了圖片！如果要點擊放大，可以告訴我，我可以幫你加 lightbox。');
    });
  </script>
</body>
</html>
