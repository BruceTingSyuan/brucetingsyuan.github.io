<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>獎品頁</title>
  <style>
    body{ font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans CJK TC", "Microsoft JhengHei"; background:#f7fafc; margin:0; padding:24px; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .wrap{ max-width:760px; width:100%; background:#fff; padding:20px; border-radius:12px; box-shadow:0 8px 28px rgba(20,30,50,0.06); text-align:center; }
    h1{ margin:0 0 12px; font-size:20px; }
    .img{ max-width:100%; height:auto; border-radius:8px; box-shadow:0 6px 18px rgba(20,30,50,0.06); }
    .desc{ color:#333; font-size:15px; margin-top:12px; line-height:1.5; }
    .actions{ margin-top:16px; display:flex; gap:10px; justify-content:center; }
    .btn{ padding:10px 14px; border-radius:8px; border:1px solid #d0d6e0; background:#f5f7fb; cursor:pointer; font-size:14px; }
    .btn.primary{ background: linear-gradient(180deg,#4f9ef5,#3b7ee8); color:#fff; border-color:#2f6fd6; box-shadow:0 8px 22px rgba(63,115,210,0.14); }
  </style>
</head>
<body>
  <div class="wrap" role="main">
    <h1>恭喜林汝珊~您獲得周廷軒一個吻的兌換卷</h1>
    <img src="2.png" alt="選項 A 的示意圖" class="img">
    <p class="desc">
      請截圖此頁面保存!!!
    </p>

    <div class="actions">
      <button class="btn primary" id="homeBtn">再玩一次</button>
    </div>
  </div>

  <script>
    document.getElementById('homeBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });


  </script>
</body>
</html>
